# Codex CLI config docs: https://github.com/openai/codex/blob/main/docs/config.md
#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
model_reasoning_effort = "medium"
tool_output_token_limit = 100000
personality = "friendly"

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[features]
undo = true
shell_tool = true
steer = true
# unified_exec (experimental): switches Codex from the legacy “run shell tool → capture stdout/stderr” path to a single PTY-backed execution path.
remote_models = true
shell_snapshot = true
multi_agent = true
prevent_idle_sleep = true
plugins = true


[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "five-hour-limit", "weekly-limit", "context-window-size", "session-id"]

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."google-drive@openai-curated"]
enabled = true

